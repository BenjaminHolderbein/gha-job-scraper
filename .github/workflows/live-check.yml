name: Live source check
on:
  schedule:
    - cron: "0 13 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  live:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --frozen
      - name: Install Playwright browser
        run: uv run playwright install chromium --with-deps
      - name: Run live tests
        run: uv run pytest -m live -v
      - name: Notify ntfy on failure
        if: failure()
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          if [ -z "$NTFY_TOPIC" ]; then
            echo "NTFY_TOPIC unset; skipping ntfy push"
            exit 0
          fi
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          curl -fsSL \
            -H "Title: gha-job-scraper: live source check failed" \
            -H "Priority: high" \
            -H "Tags: warning" \
            -H "Click: $run_url" \
            -d "An upstream source may have changed shape or gone offline. See run for details." \
            "https://ntfy.sh/${NTFY_TOPIC}"
      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Live source check failed (${new Date().toISOString().slice(0,10)})`;
            const body = [
              `The daily \`live-check\` workflow failed. One or more upstream sources may have changed shape or gone offline.`,
              ``,
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            ].join("\n");
            // Avoid spamming: if an open issue with the same label already
            // exists, just comment on it instead of opening a new one.
            const label = "live-check-failure";
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: label,
            });
            if (existing.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data[0].number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: [label],
              });
            }
